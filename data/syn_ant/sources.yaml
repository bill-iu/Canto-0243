# Syn/Ant data source manifest
# - enabled_by_default: included in `python ingest_syn_ant.py normalize` without --source
# - local_only: raw files must be placed under data/syn_ant/raw/ by maintainer (not committed)
# - license: informational; verify before redistribution

sources:
  - id: current_static
    type: bundled
    parser: current_static
    license: bundled
    enabled_by_default: true
    paths:
      cilin: data/cilin/new_cilin.txt
      antisem: data/antonym/antisem.txt
      thesaurus_syn: data/thesaurus/dict_synonym.txt
      thesaurus_ant: data/thesaurus/dict_antonym.txt
    source_rank: 70
    attribution: Project bundled static thesaurus files

  - id: cilin
    type: cilin
    parser: cilin_like
    license: bundled
    enabled_by_default: false
    raw_path: data/cilin/new_cilin.txt
    source_rank: 55
    attribution: Cilin extended (Traditional Chinese via fetch_cilin_data.py)

  - id: cow
    type: wordnet
    parser: wordnet_synsets
    license: CC-BY
    enabled_by_default: false
    local_only: true
    raw_path: data/syn_ant/raw/cow/cow.txt
    source_rank: 50
    attribution: Chinese Open Wordnet (COW)

  - id: relation_pairs
    type: pairs
    parser: relation_pairs
    license: research
    enabled_by_default: false
    local_only: true
    raw_path: data/syn_ant/raw/pairs/relations.tsv
    source_rank: 60
    attribution: Optional TSV pairs (head, tail, relation_type)

  - id: hit_cilin
    type: cilin
    parser: cilin_like
    license: unclear
    enabled_by_default: false
    local_only: true
    raw_path: data/syn_ant/raw/hit_cilin/new_cilin.txt
    source_rank: 55
    attribution: HIT Cilin Extended (maintainer local copy only)

  - id: antisem_extended
    type: antonym
    parser: antonym_pairs
    license: unclear
    enabled_by_default: false
    local_only: true
    raw_path: data/syn_ant/raw/antisem/antisem.txt
    source_rank: 55
    attribution: Extended antisem dictionary (local only)
