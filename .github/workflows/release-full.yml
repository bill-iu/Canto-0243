name: Release (full)

# ADR-0008: strict semver tag → dual-platform portable + publish draft release.
# Before push tag: create draft release and upload lyrics.db (see docs/release.md).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-full-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Verify draft release includes lyrics.db
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          # ponytail: gh release view uses REST get-by-tag; draft releases are list-only until published
          found=""
          for i in $(seq 1 12); do
            found=$(gh api "repos/${REPO}/releases" --paginate --jq ".[] | select(.tag_name==\"${TAG}\") | .id" | head -1)
            if [[ -n "$found" ]]; then
              break
            fi
            echo "Waiting for draft release ${TAG} (attempt ${i}/12)..."
            sleep 5
          done
          if [[ -z "$found" ]]; then
            echo "::error::No GitHub Release for ${TAG}. Create a draft release and upload lyrics.db before pushing the tag."
            exit 1
          fi
          gh release download "$TAG" --pattern "lyrics.db" --clobber
          if [[ ! -s lyrics.db ]]; then
            echo "::error::Release ${TAG} has no lyrics.db asset."
            exit 1
          fi
          echo "OK: lyrics.db from release ${TAG} ($(wc -c < lyrics.db) bytes)"

      - uses: actions/upload-artifact@v4
        with:
          name: lyrics-db
          path: lyrics.db
          retention-days: 2

  build-windows:
    needs: gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lyrics-db

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build Windows portable zip
        shell: pwsh
        run: |
          if (-not (Test-Path lyrics.db)) { throw "lyrics.db missing" }
          powershell -ExecutionPolicy Bypass -File scripts/build-portable.ps1 -SkipReadmeSync
        env:
          PYTHONUTF8: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/canto-0243-portable.zip
          retention-days: 2

  build-macos:
    needs: gate
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            artifact: canto-0243-portable-macos-arm64.tar.gz
          - runner: macos-15-intel
            arch: x86_64
            artifact: canto-0243-portable-macos-x86_64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lyrics-db

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build macOS portable tar.gz (${{ matrix.arch }})
        run: |
          test -s lyrics.db
          export SKIP_README_SYNC=1
          export PORTABLE_MACOS_ARCH="${{ matrix.arch }}"
          bash scripts/build-portable.sh
          test -f "dist/${{ matrix.artifact }}"
        env:
          PYTHONUTF8: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-portable-${{ matrix.arch }}
          path: dist/${{ matrix.artifact }}
          retention-days: 2

  lexicon:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lyrics-db

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Export words-lexicon.json
        run: |
          test -s lyrics.db
          pip install -r requirements.txt
          mkdir -p dist
          python scripts/export_words_lexicon.py -o dist/words-lexicon.json
        env:
          PYTHONUTF8: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: release-lexicon
          path: |
            lyrics.db
            dist/words-lexicon.json
          retention-days: 2

  publish:
    needs: [build-windows, build-macos, lexicon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          WIN="artifacts/windows-portable/canto-0243-portable.zip"
          MAC_ARM="artifacts/macos-portable-arm64/canto-0243-portable-macos-arm64.tar.gz"
          MAC_X86="artifacts/macos-portable-x86_64/canto-0243-portable-macos-x86_64.tar.gz"
          DB="artifacts/release-lexicon/lyrics.db"
          JSON="artifacts/release-lexicon/dist/words-lexicon.json"
          for f in "$WIN" "$MAC_ARM" "$MAC_X86" "$DB" "$JSON"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing artifact: $f"
              exit 1
            fi
          done
          gh release upload "$TAG" \
            "$WIN" \
            "$MAC_ARM" \
            "$MAC_X86" \
            "$DB" \
            "$JSON" \
            --clobber
          gh release edit "$TAG" --draft=false
          echo "Published ${TAG} (five artifacts attached, draft cleared)."
