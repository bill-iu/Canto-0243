name: Release (macOS Intel beta)

# ponytail: workflow_dispatch to ship x86_64 tar without waiting on arm64 CI matrix.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.6.5)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-upload-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Download lyrics.db from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          gh release download "$TAG" --pattern "lyrics.db" --clobber
          test -s lyrics.db

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build macOS x86_64 portable tar.gz
        run: |
          export SKIP_README_SYNC=1
          export PORTABLE_MACOS_ARCH=x86_64
          bash scripts/build-portable.sh
          test -f dist/canto-0243-portable-macos-x86_64.tar.gz
        env:
          PYTHONUTF8: "1"

      - name: Export words-lexicon.json
        run: |
          pip install -r requirements.txt
          python scripts/export_words_lexicon.py -o dist/words-lexicon.json

      - name: Upload macOS Intel assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          gh release upload "$TAG" \
            dist/canto-0243-portable-macos-x86_64.tar.gz \
            dist/words-lexicon.json \
            --clobber
          gh release edit "$TAG" --draft=false --prerelease
          echo "Uploaded x86_64 tar to ${TAG}"
