<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EBDFD0">
  <title>關係補錄 · Canto-0243</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=block" rel="stylesheet">
  <link rel="stylesheet" href="open-design.css">
  <link rel="stylesheet" href="relation-entry.css">
</head>
<body>
  <a class="skip-link" href="#relationForm">跳到表單</a>

  <header class="app-header">
    <div class="app-bar">
      <a class="brand brand-link" href="index.html" aria-label="返回查韻首頁">
        <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" width="200" height="72" viewBox="0 0 200 72" aria-hidden="true" focusable="false">
          <defs>
            <filter id="brush-roughen-brand-header" x="-8%" y="-120%" width="116%" height="340%">
              <feTurbulence type="fractalNoise" baseFrequency="0.042 0.38" numOctaves="4" seed="7" result="turb"/>
              <feDisplacementMap in="SourceGraphic" in2="turb" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
          </defs>
          <text x="4" y="50" font-family="'Noto Serif TC', serif" font-size="44" font-weight="900" fill="#1C1917">粵</text>
          <text x="62" y="28" font-family="'Noto Serif TC', serif" font-size="12" font-weight="900" fill="#9F1239" letter-spacing="2.2">CANTO</text>
          <text x="62" y="48" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" font-weight="600" fill="#1C1917" letter-spacing="1">0243</text>
          <path filter="url(#brush-roughen-brand-header)" d="M4 55.5 C14 54.9 24 55.1 34 55.7 C44 56.3 52 56.7 60 56.5 C68 57.9 76 58.5 84 57.3 C92 55.2 98 52.8 104 51.2 C106.5 50.4 110 49.6 114 48.8 C118 47.6 122 47.2 126 46.8 C128 46.5 130 46.2 132 45.9 C133.5 45.6 134.5 45.4 135 45.2 L135.1 45.8 L134.6 46.3 L133.8 46.8 L132.6 47.3 L130.8 47.8 L128.5 48.2 C96 55.3 80 60.5 62 61.8 C46 62.3 30 60.3 18 57.3 C10 55.3 5 53.5 4 55.5 Z" fill="#9F1239"/>
          <path d="M133.5 47.0 L135.0 45.5" stroke="#9F1239" stroke-width="0.9" stroke-linecap="round"/>
          <path d="M132.2 48.4 L133.6 49.2" stroke="#9F1239" stroke-width="0.65" stroke-linecap="round"/>
          <path d="M134.2 46.2 L135.2 44.9" stroke="#9F1239" stroke-width="0.5" stroke-linecap="round"/>
          <path d="M132.8 47.6 L134.0 48.4" stroke="#9F1239" stroke-width="0.4" stroke-linecap="round"/>
          <path d="M134.0 46.6 L135.0 45.8" stroke="#9F1239" stroke-width="0.3" stroke-linecap="round"/>
        </svg>
      </a>

      <nav class="app-actions" aria-label="頁面操作">
        <a class="ghost-button" href="index.html">返回查韻</a>
      </nav>
    </div>
  </header>

  <main class="main-wrap relation-main">
    <header class="relation-hero">
      <h1>關係補錄</h1>
      <p class="relation-lede">為已收錄字面補近義或反義關係。種子字面為擴展起點；對端字面提供一跳鄰居來源。</p>
    </header>

    <form class="relation-form" id="relationForm">
      <div class="field">
        <label for="seedChar">種子字面</label>
        <span class="hint">擴展從此字面出發（例如要補「快樂」的關係時填快樂）</span>
        <div class="search-input-wrap" data-input-wrap>
          <input type="text" id="seedChar" name="seed_char" required autocomplete="off" spellcheck="false">
        </div>
      </div>

      <div class="field">
        <label for="oppositeChar">對端字面</label>
        <span class="hint">與種子建立 direct 關係的另一字面</span>
        <div class="search-input-wrap" data-input-wrap>
          <input type="text" id="oppositeChar" name="opposite_char" required autocomplete="off" spellcheck="false">
        </div>
      </div>

      <div class="field">
        <span id="relationTypeLabel">關係類型</span>
        <div class="relation-type" role="radiogroup" aria-labelledby="relationTypeLabel">
          <label><input type="radio" name="relation_type" value="syn" checked> 近義</label>
          <label><input type="radio" name="relation_type" value="ant"> 反義</label>
        </div>
      </div>

      <div class="actions">
        <button class="primary-button" id="submitBtn" type="submit">補上關係</button>
        <button class="danger-button" id="revokeBtn" type="button">撤回關係</button>
      </div>

      <div class="status ok" id="okStatus" hidden role="status"></div>
      <div class="status err" id="errStatus" hidden role="alert"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("relationForm");
    const okStatus = document.getElementById("okStatus");
    const errStatus = document.getElementById("errStatus");
    const submitBtn = document.getElementById("submitBtn");
    const revokeBtn = document.getElementById("revokeBtn");

    const SEARCH_RING_BLUR_MS = 320;
    function bindInputDualRing(wrap) {
      const input = wrap.querySelector("input");
      if (!input) return;
      input.addEventListener("focus", () => {
        wrap.classList.remove("is-blurring");
        wrap.classList.add("is-focused");
      });
      input.addEventListener("blur", () => {
        wrap.classList.remove("is-focused");
        wrap.classList.add("is-blurring");
        window.setTimeout(() => wrap.classList.remove("is-blurring"), SEARCH_RING_BLUR_MS);
      });
    }
    document.querySelectorAll("[data-input-wrap]").forEach(bindInputDualRing);

    function payloadFromForm() {
      const data = new FormData(form);
      return {
        seed_char: String(data.get("seed_char") || "").trim(),
        opposite_char: String(data.get("opposite_char") || "").trim(),
        relation_type: String(data.get("relation_type") || "syn"),
      };
    }

    async function postRelation(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const body = await response.json().catch(() => ({}));
      return { response, body };
    }

    function showOk(text) {
      okStatus.textContent = text;
      okStatus.hidden = false;
      errStatus.hidden = true;
    }

    function showErr(text) {
      errStatus.textContent = text;
      errStatus.hidden = false;
      okStatus.hidden = true;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      okStatus.hidden = true;
      errStatus.hidden = true;
      submitBtn.disabled = true;
      revokeBtn.disabled = true;

      try {
        const { response, body } = await postRelation("/relations/manual", payloadFromForm());
        if (!response.ok) {
          showErr(body.detail || "提交失敗，請稍後再試。");
          return;
        }
        showOk(body.message || "已補上關係。");
      } catch (error) {
        showErr("無法連線後端。請確認伺服器已啟動。");
      } finally {
        submitBtn.disabled = false;
        revokeBtn.disabled = false;
      }
    });

    revokeBtn.addEventListener("click", async () => {
      okStatus.hidden = true;
      errStatus.hidden = true;
      submitBtn.disabled = true;
      revokeBtn.disabled = true;

      try {
        const { response, body } = await postRelation(
          "/relations/manual/revoke",
          payloadFromForm()
        );
        if (!response.ok) {
          showErr(body.detail || "撤回失敗，請稍後再試。");
          return;
        }
        showOk(body.message || "已撤回關係。");
      } catch (error) {
        showErr("無法連線後端。請確認伺服器已啟動。");
      } finally {
        submitBtn.disabled = false;
        revokeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
