<!DOCTYPE html>
<html lang="zh-HK">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0243 離線押韻字典 - 1.0</title>
  <style>
    body {
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #333;
    }

    .header {
      background: white;
      padding: 12px 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .menu-btn {
      font-size: 28px;
      cursor: pointer;
      margin-right: 15px;
      color: #555;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #d4380d;
    }

    .sidebar {
      position: fixed;
      left: -280px;
      top: 0;
      bottom: 0;
      width: 280px;
      background: white;
      box-shadow: 4px 0 12px rgba(0, 0, 0, 0.2);
      transition: left 0.3s ease;
      z-index: 200;
      padding: 20px 0;
      overflow-y: auto;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-item {
      padding: 12px 25px;
      cursor: pointer;
      font-size: 16px;
    }

    .sidebar-item:hover {
      background: #f8f8f8;
    }

    .main-content {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .mode-btn {
      padding: 12px 32px;
      margin: 0 10px;
      border: 2px solid #ddd;
      background: white;
      color: #333;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      min-width: 190px;
      transition: all 0.2s ease;
    }

    .mode-btn.active {
      background: #d4380d;
      color: white;
      border-color: #d4380d;
    }

    .mode-btn:not(.active):hover {
      background: #fafafa;
      border-color: #ccc;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    button {
      padding: 14px 32px;
      background: #d4380d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      padding: 10px 0;
    }

    .result-item {
      background: #fff;
      color: #333;
      padding: 14px 10px;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
      cursor: pointer;
    }

    .result-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 56, 13, 0.15);
    }

    .info {
      text-align: center;
      color: #666;
      padding: 60px 20px;
      font-size: 18px;
    }

    .stats {
      text-align: center;
      margin: 10px 0;
      color: #666;
      font-size: 15px;
    }

    /* Synonym / Antonym two-column layout (no scores, pure word buttons) */
    .syn-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .syn-section {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .syn-section h4 {
      margin: 4px 8px 8px;
      font-size: 15px;
      color: #d4380d;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 4px;
    }
    .syn-section .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      padding: 0;
    }
  </style>
</head>

<body>
  <div class="header">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    <span class="logo" onclick="goHome()" style="cursor:pointer;">0243 離線押韻字典</span>
  </div>

  <div id="sidebar" class="sidebar">
    <div class="sidebar-item" onclick="toggleSidebar()">🏠 首頁</div>
    <div class="sidebar-item">🔍 數字搵詞</div>
    <div class="sidebar-item">📝 漢字搵詞</div>
    <div class="sidebar-item">🔗 等號韻搜尋</div>

    <div style="margin-top:40px; padding:0 20px;">
      <div style="font-weight:bold; margin-bottom:12px; color:#555;">模式切換</div>
      <button id="btn-m1" class="mode-btn active" onclick="switchMode('m1')">模式1 - 0243</button>
      <button id="btn-m2" class="mode-btn" onclick="switchMode('m2')">模式2 - 02493</button>
      <button id="btn-syn" class="mode-btn" onclick="switchMode('syn')">近義/反義詞查找</button>
    </div>
  </div>

  <div class="main-content">
    <!-- 已移除 onkeyup，改由 JavaScript 統一處理 Enter -->
    <input type="text" id="searchInput" placeholder="0243/搵嘢" autocomplete="off">
    <button onclick="searchDict()">🔍 搜尋</button>

    <div id="stats" class="stats"></div>
    <div id="results" class="results"></div>
  </div>

  <script>
    let currentMode = 'm1';
    let currentResults = [];
    let currentOffset = 0;
    let isSearching = false;
    let currentQuery = "";
    const PAGE_SIZE = 200;
    const searchCache = new Map();

    const $ = {
      searchInput: document.getElementById("searchInput"),
      results: document.getElementById("results"),
      stats: document.getElementById("stats"),
      sidebar: document.getElementById("sidebar"),
    };

    function updateBrowserUrl(query = "", mode = currentMode, replace = false) {
      const params = new URLSearchParams();
      if (query) params.set('q', query);
      if (mode) params.set('mode', mode);
      const url = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ''}`;
      const state = { type: query ? 'search' : 'home', query, mode };
      if (replace) {
        window.history.replaceState(state, '', url);
      } else {
        window.history.pushState(state, '', url);
      }
    }

    function createResultButton(text, query, title = "") {
      const item = document.createElement("button");
      item.type = "button";
      item.className = "result-item";
      item.textContent = text;
      item.title = title;
      item.addEventListener("click", () => handleResultClick(query));
      return item;
    }

    function handleResultClick(queryText) {
      $.searchInput.value = queryText;
      searchDict();
    }

    function renderSearchResults(data, { append = false } = {}) {
      if (!append) {
        $.results.innerHTML = "";
        $.results.className = currentMode === 'syn' ? 'syn-container' : 'results';
      }

      if (currentMode === 'syn') {
        const syns = data.filter(r => r.relation === 'syn');
        const ants = data.filter(r => r.relation === 'ant');
        $.results.appendChild(createSynSection('近義詞', syns));
        $.results.appendChild(createSynSection('反義詞', ants));
        $.stats.textContent = `近義/反義詞查找（近義 ${syns.length} / 反義 ${ants.length}）`;
        toggleLoadMoreButton(false);
        return;
      }

      $.results.className = 'results';
      const frag = document.createDocumentFragment();
      data.forEach(word => {
        const displayText = word.display_text || word.char;
        const queryText = word.query_text || word.char;
        frag.appendChild(createResultButton(displayText, queryText, word.jyutping || ""));
      });
      $.results.appendChild(frag);
      $.stats.textContent = `找到 ${currentResults.length + data.length} 個結果（${currentMode} 模式）`;
      toggleLoadMoreButton(data.length === PAGE_SIZE);
    }

    function createSynSection(title, items) {
      const section = document.createElement('div');
      section.className = 'syn-section';
      const h = document.createElement('h4');
      h.textContent = title + (items.length ? ` (${items.length})` : '');
      section.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'results';
      items.forEach(w => {
        const char = (w && typeof w === 'object') ? (w.char || w) : w;
        const btn = createResultButton(char, char);  // no score, no jyut title for syn
        grid.appendChild(btn);
      });
      if (!items.length) {
        const empty = document.createElement('div');
        empty.textContent = '（無）';
        empty.style.color = '#999';
        empty.style.fontSize = '13px';
        grid.appendChild(empty);
      }
      section.appendChild(grid);
      return section;
    }

    function goHome() {
      $.searchInput.value = "";
      $.results.innerHTML = "";
      $.stats.textContent = "";
      toggleLoadMoreButton(false);
      currentQuery = "";
      updateBrowserUrl('', currentMode, true);
    }

    function getModeLabel() {
      if (currentMode === 'syn') return '近義/反義詞查找';
      return currentMode === 'm2' ? '02493/搵嘢' : '0243/搵嘢';
    }

    function finishSearchWithData(data, { append = false } = {}) {
      renderSearchResults(data, { append });
      currentResults = currentResults.concat(data);
      currentOffset += data.length;
    }

    async function searchDict(isLoadMore = false, restoreFromHistory = false) {
      if (isSearching) return;
      isSearching = true;

      const input = $.searchInput.value.trim();

      if (!isLoadMore) {
        $.results.innerHTML = "";
        $.stats.textContent = "";
        currentResults = [];
        currentOffset = 0;
        $.results.className = 'results';
      }

      if (!input) {
        $.results.innerHTML = `<p class="info">${getModeLabel()}<br>請輸入搜尋內容，例如：<br>23就、香港=、39香港=、大蛋糕=</p>`;
        currentQuery = "";
        isSearching = false;
        return;
      }

      if (!restoreFromHistory && !isLoadMore) {
        updateBrowserUrl(input, currentMode);
      }
      currentQuery = input;

      const cacheKey = `${currentMode}:${input}:${currentOffset}`;
      if (!isLoadMore && searchCache.has(cacheKey)) {
        const data = searchCache.get(cacheKey);
        if (!Array.isArray(data)) {
          searchCache.delete(cacheKey);
        } else {
          finishSearchWithData(data, { append: isLoadMore });
          isSearching = false;
          return;
        }
      }

      const url = `/words/search/?q=${encodeURIComponent(input)}&mode=${currentMode}&limit=${PAGE_SIZE}&offset=${currentOffset}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("後端錯誤");
        const data = await res.json();

        if (!isLoadMore) {
          searchCache.set(cacheKey, data);
          if (searchCache.size > 64) {
            searchCache.delete(searchCache.keys().next().value);
          }
        }

        if (data.length === 0 && !isLoadMore) {
          $.results.innerHTML = `<p class="info">找不到符合「${input}」的結果</p>`;
          isSearching = false;
          return;
        }

        finishSearchWithData(data, { append: isLoadMore });

      } catch (e) {
        console.error("Backend fetch failed:", e);
        $.results.innerHTML = `
          <p class="info" style="color:red;">
            無法連接到後端<br>
            <small>請確認後端已啟動 (python main.py 或 start.sh)，並查看終端機是否有錯誤訊息。</small>
          </p>
        `;
      }

      isSearching = false;
    }

    function toggleLoadMoreButton(show) {
      let btn = document.getElementById("loadMoreBtn");
      if (!btn) {
        btn = document.createElement("button");
        btn.id = "loadMoreBtn";
        btn.textContent = "載入更多";
        btn.style.margin = "20px auto";
        btn.style.display = "block";
        btn.onclick = () => searchDict(true);
        $.results.after(btn);
      }
      btn.style.display = show ? "block" : "none";
    }

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      const btnEl = document.getElementById(`btn-${mode}`);
      if (btnEl) btnEl.classList.add('active');
      $.searchInput.placeholder = getModeLabel();
      const input = $.searchInput.value.trim();
      if (input) {
        updateBrowserUrl(input, currentMode, true);
        searchDict();
      } else {
        updateBrowserUrl('', currentMode, true);
      }
    }

    function toggleSidebar() {
      $.sidebar.classList.toggle("open");
    }

    window.addEventListener('popstate', function (event) {
      const state = event.state || { type: 'home' };
      if (state.type === 'search') {
        $.searchInput.value = state.query || "";
        currentMode = state.mode || 'm1';
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${currentMode}`);
        if (activeBtn) activeBtn.classList.add('active');
        $.searchInput.placeholder = getModeLabel();
        currentQuery = state.query || "";
        searchDict(false, true);
      } else {
        goHome();
      }
    });

    $.searchInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        searchDict();
      }
    });

    (function init() {
      const params = new URLSearchParams(window.location.search);
      const initialQuery = params.get('q') || '';
      const initialMode = params.get('mode') || 'm1';
      if (initialMode === 'm2' || initialMode === 'syn') {
        switchMode(initialMode);
      } else {
        currentMode = 'm1';
        document.getElementById('btn-m1').classList.add('active');
        const b2 = document.getElementById('btn-m2');
        if (b2) b2.classList.remove('active');
        const bs = document.getElementById('btn-syn');
        if (bs) bs.classList.remove('active');
      }
      $.searchInput.placeholder = getModeLabel();
      if (initialQuery) {
        $.searchInput.value = initialQuery;
        searchDict();
      } else {
        updateBrowserUrl('', currentMode, true);
      }
    })();
  </script>
</body>

</html>
