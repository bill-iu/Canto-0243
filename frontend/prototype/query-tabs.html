<!DOCTYPE html>
<!-- PROTOTYPE 定案 — 查詢分頁 Variant A（Open Design）。試玩後 TDD 接入 index.html。 -->
<html lang="zh-HK" data-landing="a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>PROTOTYPE · 查詢分頁 A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=block" rel="stylesheet">
  <script>
    (function () {
      document.documentElement.classList.add("fonts-ready");
    })();
  </script>
  <link rel="stylesheet" href="../open-design.css">
  <link rel="stylesheet" href="../index.css">
  <link rel="stylesheet" href="chrome-tabs.css">
  <link rel="stylesheet" href="query-tabs.css">
</head>
<body class="prototype-query-tabs">
  <p class="prototype-ribbon">
    <strong>PROTOTYPE</strong> 查詢分頁定案 A · Open Design ·
    <kbd>Alt+N</kbd> 新分頁 · <kbd>Alt+W</kbd> 關閉 · 中鍵點標籤關閉 ·
    <a href="../index.html">正式查韻介面</a>
  </p>

  <a class="skip-link" href="#searchInput">跳到搜尋</a>

  <div class="app-shell" id="appShell">
    <header class="app-header app-header--tabs">
      <div class="app-header__chrome">
        <button class="brand" id="homeBtn" type="button" aria-label="返回搜尋首頁">
          <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" width="200" height="72" viewBox="0 0 200 72" aria-hidden="true" focusable="false">
            <defs>
              <filter id="brush-roughen-brand-header" x="-8%" y="-120%" width="116%" height="340%">
                <feTurbulence type="fractalNoise" baseFrequency="0.042 0.38" numOctaves="4" seed="7" result="turb"/>
                <feDisplacementMap in="SourceGraphic" in2="turb" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
              </filter>
            </defs>
            <text x="4" y="50" font-family="'Noto Serif TC', serif" font-size="44" font-weight="900" fill="#1C1917">粵</text>
            <text x="62" y="28" font-family="'Noto Serif TC', serif" font-size="12" font-weight="900" fill="#9F1239" letter-spacing="2.2">CANTO</text>
            <text x="62" y="48" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" font-weight="600" fill="#1C1917" letter-spacing="1">0243</text>
            <path filter="url(#brush-roughen-brand-header)" d="M4 55.5 C14 54.9 24 55.1 34 55.7 C44 56.3 52 56.7 60 56.5 C68 57.9 76 58.5 84 57.3 C92 55.2 98 52.8 104 51.2 C106.5 50.4 110 49.6 114 48.8 C118 47.6 122 47.2 126 46.8 C128 46.5 130 46.2 132 45.9 C133.5 45.6 134.5 45.4 135 45.2 L135.1 45.8 L134.6 46.3 L133.8 46.8 L132.6 47.3 L130.8 47.8 L128.5 48.2 C96 55.3 80 60.5 62 61.8 C46 62.3 30 60.3 18 57.3 C10 55.3 5 53.5 4 55.5 Z" fill="#9F1239"/>
            <path d="M133.5 47.0 L135.0 45.5" stroke="#9F1239" stroke-width="0.9" stroke-linecap="round"/>
            <path d="M132.2 48.4 L133.6 49.2" stroke="#9F1239" stroke-width="0.65" stroke-linecap="round"/>
            <path d="M134.2 46.2 L135.2 44.9" stroke="#9F1239" stroke-width="0.5" stroke-linecap="round"/>
            <path d="M132.8 47.6 L134.0 48.4" stroke="#9F1239" stroke-width="0.4" stroke-linecap="round"/>
            <path d="M134.0 46.6 L135.0 45.8" stroke="#9F1239" stroke-width="0.3" stroke-linecap="round"/>
          </svg>
        </button>
        <nav class="app-actions" aria-label="主要操作">
          <button class="menu-trigger" type="button" aria-expanded="false" disabled style="opacity:0.72;cursor:default">
            <span class="mode-trigger-text"><span class="mode-trigger-primary">0243模式</span><span class="mode-trigger-note">鬆</span></span>
            <span class="menu-chevron" aria-hidden="true">▾</span>
          </button>
          <button class="ghost-button prototype-guide-btn" type="button" disabled style="opacity:0.72;cursor:default">搜尋教學</button>
          <a class="ghost-button prototype-guide-btn" href="../relation-entry.html" style="opacity:0.72">補關係</a>
        </nav>
      </div>
      <div class="app-header__tabdeck" aria-label="查詢分頁">
        <div class="tabdeck-strip" aria-label="查詢分頁列（Chrome Tabs）">
          <div class="chrome-tabs" id="queryChromeTabs">
            <svg class="chrome-tabs-defs" aria-hidden="true" width="0" height="0" style="position:absolute">
              <defs>
                <symbol id="query-tab-geometry" viewBox="0 0 214 36">
                  <path d="M17 0h197v36H0v-2c4.5 0 9-3.5 9-8V8c0-4.5 3.5-8 8-8z"/>
                </symbol>
              </defs>
            </svg>
            <div class="chrome-tabs-content" id="queryTabstrip" role="tablist" aria-label="查詢分頁列"></div>
            <div class="chrome-tabs-bottom-bar" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="main-wrap" id="mainContent">
      <section class="search-view" id="searchView" aria-labelledby="searchTitle">
        <div class="hero">
          <p class="eyebrow">Cantonese Lyrics Writing Workbench</p>
          <h1 id="searchTitle">ONE·搵·韻</h1>
          <p>格律/協音/押韻/近反義，一秒搵到。</p>
        </div>

        <form class="search-panel" id="searchForm" role="search">
          <div class="field-label-row">
            <label class="field-label" for="searchInput">搜尋內容</label>
            <span class="mode-readout" id="modeReadout">目前模式：0243模式（鬆）</span>
          </div>
          <div class="search-row">
            <div class="search-input-wrap">
              <input type="search" id="searchInput" name="q" placeholder="輸入 香??、23*就=、~=開心、!!、~~…" autocomplete="off" spellcheck="false" enterkeyhint="search">
            </div>
            <div class="search-actions">
              <button class="primary-button" id="searchBtn" type="submit">搜尋</button>
            </div>
          </div>
        </form>

        <div class="status-row">
          <div id="stats" class="stats" aria-live="polite"></div>
        </div>

        <div id="results" class="results" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <button type="button" class="prototype-state-toggle" id="stateToggle" aria-expanded="false">顯示 prototype 狀態（session／URL）</button>
  <pre id="statePanel" class="prototype-state-panel" hidden></pre>

  <script src="chrome-tabs-layout.js"></script>
  <script>
    const SESSION_KEY = "canto0243:prototype:query-tabs";
    const TAB_LABEL_MAX = 18;
    const MODE_READOUT = "目前模式：0243模式（鬆）";

    const MOCK_RESULTS = {
      "~~": ["朋友", "同伴", "知己", "美麗", "道路"],
      "~~港": ["香港", "海港"],
      "香??": ["香港", "香江", "香水", "香爐"],
      "~開心": ["快樂", "歡喜", "愉快"],
    };

    let nextTabId = 1;
    let state = {
      activeId: 1,
      tabs: [],
    };

    const $ = {
      chromeTabs: document.getElementById("queryChromeTabs"),
      tabstrip: document.getElementById("queryTabstrip"),
      searchInput: document.getElementById("searchInput"),
      searchForm: document.getElementById("searchForm"),
      results: document.getElementById("results"),
      stats: document.getElementById("stats"),
      homeBtn: document.getElementById("homeBtn"),
      stateToggle: document.getElementById("stateToggle"),
      statePanel: document.getElementById("statePanel"),
    };

    const TAB_GEOMETRY_SVG = `
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <svg width="52%" height="100%"><use xlink:href="#query-tab-geometry" width="214" height="36" class="chrome-tab-geometry"/></svg>
        <g transform="scale(-1, 1)"><svg width="52%" height="100%" x="-100%" y="0"><use xlink:href="#query-tab-geometry" width="214" height="36" class="chrome-tab-geometry"/></svg></g>
      </svg>`;

    let chromeLayout = null;

    function mockResults(q) {
      const key = (q || "").trim();
      if (!key) return [];
      if (MOCK_RESULTS[key]) return MOCK_RESULTS[key];
      if (key.startsWith("~~")) return MOCK_RESULTS["~~"];
      if (key.startsWith("~")) return MOCK_RESULTS["~開心"];
      if (key.includes("?")) return MOCK_RESULTS["香??"];
      return ["（示範）試試 ~~、香??、~開心"];
    }

    function tabLabel(tab) {
      const q = (tab.q || "").trim();
      if (!q) return "新查詢";
      return q.length > TAB_LABEL_MAX ? `${q.slice(0, TAB_LABEL_MAX)}…` : q;
    }

    function activeTab() {
      return state.tabs.find((t) => t.id === state.activeId) || state.tabs[0];
    }

    function createTab(q = "") {
      const id = nextTabId++;
      return {
        id,
        q,
        view: "search",
        results: q.trim() ? mockResults(q) : [],
        offset: 0,
        total: null,
      };
    }

    function persistSession() {
      const payload = {
        activeId: state.activeId,
        nextTabId,
        tabs: state.tabs.map((t) => ({
          id: t.id,
          q: t.q,
          view: t.view,
          results: t.results,
          offset: t.offset,
          total: t.total,
        })),
      };
      try {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(payload));
      } catch {
        /* prototype: ignore quota */
      }
    }

    function loadSession() {
      try {
        const raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!Array.isArray(data.tabs) || !data.tabs.length) return false;
        state.tabs = data.tabs;
        state.activeId = data.activeId || data.tabs[0].id;
        nextTabId = data.nextTabId || Math.max(...data.tabs.map((t) => t.id)) + 1;
        return true;
      } catch {
        return false;
      }
    }

    function readUrlParams() {
      const params = new URLSearchParams(location.search);
      return {
        q: params.get("q") || "",
        mode: params.get("mode") || "m1",
        view: params.get("view") === "guide" ? "guide" : "search",
      };
    }

    function updateBrowserUrl(tab) {
      const params = new URLSearchParams();
      if (tab.q) params.set("q", tab.q);
      if (tab.view && tab.view !== "search") params.set("view", tab.view);
      const suffix = params.toString() ? `?${params.toString()}` : "";
      const url = `${location.pathname}${suffix}`;
      history.replaceState({ tabId: tab.id }, "", url);
    }

    function renderResults(tab) {
      const results = tab.results || [];
      if (!results.length) {
        $.results.innerHTML = tab.q.trim()
          ? `<p class="info">（示範）找不到或尚未搜尋。</p>`
          : "";
        $.stats.textContent = "";
        return;
      }
      $.results.innerHTML = `<ul style="list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;gap:8px;">${
        results.map((w) => `<li style="padding:6px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--line)">${escapeHtml(w)}</li>`).join("")
      }</ul>`;
      $.stats.textContent = `共 ${results.length} 個結果（示範）`;
    }

    function syncUiFromActiveTab() {
      const tab = activeTab();
      if (!tab) return;
      $.searchInput.value = tab.q || "";
      renderResults(tab);
      updateBrowserUrl(tab);
      renderTabstrip();
      dumpState();
    }

    function saveActiveTabFromUi() {
      const tab = activeTab();
      if (!tab) return;
      tab.q = $.searchInput.value;
    }

    function scrollActiveTabIntoView() {
      const active = $.tabstrip.querySelector(".chrome-tab[active]");
      if (!active) return;
      active.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
    }

    function renderTabstrip() {
      const tabsHtml = state.tabs
        .map((t, idx) => {
          const isActive = t.id === state.activeId;
          const isLast = idx === state.tabs.length - 1;
          const closeBtn =
            state.tabs.length > 1
              ? `<button type="button" class="chrome-tab-close" data-close="${t.id}" aria-label="關閉分頁"></button>`
              : "";
          return `
            <div class="chrome-tab${isLast ? " chrome-tab-is-last" : ""}" data-tab-id="${t.id}"${isActive ? " active" : ""} role="presentation">
              <div class="chrome-tab-dividers"></div>
              <div class="chrome-tab-background">${TAB_GEOMETRY_SVG}</div>
              <div class="chrome-tab-content">
                <div class="chrome-tab-favicon" hidden></div>
                <div class="chrome-tab-title">${escapeHtml(tabLabel(t))}</div>
                <div class="chrome-tab-drag-handle" role="tab" aria-selected="${isActive}" aria-label="${escapeAttr(tabLabel(t))}" data-tab="${t.id}" title="${escapeAttr(t.q || "新查詢")}"></div>
                ${closeBtn}
              </div>
            </div>`;
        })
        .join("");
      $.tabstrip.innerHTML =
        tabsHtml +
        `<div class="chrome-tab chrome-tab-add" role="presentation" data-add-tab>
          <div class="chrome-tab-add-hit" role="button" aria-label="新查詢分頁" title="Alt+N">+</div>
        </div>`;
      wireTabstrip();
      chromeLayout.layout();
      requestAnimationFrame(scrollActiveTabIntoView);
    }

    function wireTabstrip() {
      $.tabstrip.querySelectorAll("[data-tab]").forEach((el) => {
        el.addEventListener("click", () => selectTab(Number(el.dataset.tab)));
        el.addEventListener("auxclick", (e) => {
          if (e.button !== 1) return;
          e.preventDefault();
          closeTab(Number(el.dataset.tab));
        });
      });
      $.tabstrip.querySelectorAll("[data-add-tab]").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          addTab();
        });
      });

      // Hover 行為：讓左右相鄰 divider 也「真正消失」，避免留 1px 細線。
      const applyActiveNeighborDividerHides = () => {
        $.tabstrip.querySelectorAll(".chrome-tab").forEach((t) => {
          t.classList.remove("hide-left-divider-active", "hide-right-divider-active");
        });
        const active = $.tabstrip.querySelector(".chrome-tab[active]");
        if (!active) return;
        const prev = active.previousElementSibling;
        const next = active.nextElementSibling;
        if (prev && prev.classList.contains("chrome-tab") && !prev.classList.contains("chrome-tab-add")) {
          prev.classList.add("hide-right-divider-active");
        }
        if (next && next.classList.contains("chrome-tab") && !next.classList.contains("chrome-tab-add")) {
          next.classList.add("hide-left-divider-active");
        }
      };

      const clearHoverFlags = () => {
        $.tabstrip.querySelectorAll(".chrome-tab").forEach((t) => {
          t.classList.remove("is-hovered", "hide-left-divider-hover", "hide-right-divider-hover");
        });
        applyActiveNeighborDividerHides();
      };

      $.tabstrip.querySelectorAll(".chrome-tab:not(.chrome-tab-add)").forEach((tab) => {
        tab.addEventListener("mouseenter", () => {
          clearHoverFlags();
          tab.classList.add("is-hovered");
          const prev = tab.previousElementSibling;
          const next = tab.nextElementSibling;
          if (prev && prev.classList.contains("chrome-tab") && !prev.classList.contains("chrome-tab-add")) {
            prev.classList.add("hide-right-divider-hover");
          }
          if (next && next.classList.contains("chrome-tab") && !next.classList.contains("chrome-tab-add")) {
            next.classList.add("hide-left-divider-hover");
          }
        });
        tab.addEventListener("mouseleave", () => {
          clearHoverFlags();
        });
      });

      applyActiveNeighborDividerHides();

      $.tabstrip.querySelectorAll(".chrome-tab").forEach((wrap) => {
        wrap.addEventListener("auxclick", (e) => {
          if (e.button !== 1) return;
          const pick = wrap.querySelector("[data-tab]");
          if (!pick) return;
          e.preventDefault();
          closeTab(Number(pick.dataset.tab));
        });
      });
      $.tabstrip.querySelectorAll("[data-close]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          closeTab(Number(btn.dataset.close));
        });
      });
    }

    function addTab() {
      saveActiveTabFromUi();
      const tab = createTab("");
      state.tabs.push(tab);
      state.activeId = tab.id;
      persistSession();
      syncUiFromActiveTab();
      $.searchInput.focus();
    }

    function closeTab(id) {
      if (state.tabs.length <= 1) return;
      saveActiveTabFromUi();
      const idx = state.tabs.findIndex((t) => t.id === id);
      state.tabs = state.tabs.filter((t) => t.id !== id);
      if (state.activeId === id) {
        const pick = state.tabs[Math.max(0, idx - 1)];
        state.activeId = pick.id;
      }
      persistSession();
      syncUiFromActiveTab();
    }

    function selectTab(id) {
      if (state.activeId === id) return;
      saveActiveTabFromUi();
      state.activeId = id;
      persistSession();
      syncUiFromActiveTab();
      $.searchInput.focus();
    }

    function goHome() {
      const tab = activeTab();
      if (!tab) return;
      tab.q = "";
      tab.view = "search";
      tab.results = [];
      tab.offset = 0;
      tab.total = null;
      persistSession();
      syncUiFromActiveTab();
      $.searchInput.focus();
    }

    function runSearch() {
      const tab = activeTab();
      if (!tab) return;
      tab.q = $.searchInput.value.trim();
      tab.results = tab.q ? mockResults(tab.q) : [];
      tab.offset = 0;
      persistSession();
      syncUiFromActiveTab();
    }

    function dumpState() {
      const dump = {
        activeId: state.activeId,
        url: location.href,
        sessionKey: SESSION_KEY,
        tabs: state.tabs.map((t) => ({
          id: t.id,
          label: tabLabel(t),
          q: t.q,
          resultCount: (t.results || []).length,
          active: t.id === state.activeId,
        })),
      };
      $.statePanel.textContent = JSON.stringify(dump, null, 2);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function init() {
      const url = readUrlParams();
      if (!loadSession()) {
        const first = createTab(url.q || "~~");
        const second = createTab("香??");
        state.tabs = [first, second];
        state.activeId = url.q ? first.id : first.id;
        if (url.q) {
          first.q = url.q;
          first.results = mockResults(url.q);
        }
        nextTabId = 3;
      } else {
        const tab = activeTab();
        if (url.q && tab) {
          tab.q = url.q;
          tab.results = mockResults(url.q);
        }
      }

      document.getElementById("modeReadout").textContent = MODE_READOUT;
      chromeLayout = new QueryChromeTabsLayout($.chromeTabs);

      $.searchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        runSearch();
      });

      $.searchInput.addEventListener("input", () => {
        const tab = activeTab();
        if (tab) tab.q = $.searchInput.value;
        renderTabstrip();
        dumpState();
      });

      $.homeBtn.addEventListener("click", goHome);

      $.stateToggle.addEventListener("click", () => {
        const open = $.statePanel.hidden;
        $.statePanel.hidden = !open;
        $.stateToggle.setAttribute("aria-expanded", String(open));
        $.stateToggle.textContent = open ? "隱藏 prototype 狀態" : "顯示 prototype 狀態（session／URL）";
      });

      document.addEventListener("keydown", (e) => {
        if (!e.altKey || e.ctrlKey || e.metaKey) return;
        const key = e.key.toLowerCase();
        if (key === "n") {
          e.preventDefault();
          addTab();
          return;
        }
        if (key === "w") {
          e.preventDefault();
          closeTab(state.activeId);
        }
      });

      syncUiFromActiveTab();
      persistSession();
    }

    init();
  </script>
</body>
</html>
